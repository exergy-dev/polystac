name: integration

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'internal/backends/**'
      - 'pkg/**'
      - 'test/parity/**'
      - '.github/workflows/integration.yml'

# Real-backend parity matrix. Each job runs the parity corpus
# (test/parity) against a live datastore. Containers are spun up by
# testcontainers-go from inside the test (same code path as local
# dev) — no GH Actions `services:` block. Avoids the pgstac-image
# trap where /docker-entrypoint-initdb.d/990_pgstac.sh runs psql
# without -U and assumes the cluster has a `postgres` role; setting
# POSTGRES_USER to anything else (e.g. `stac`) makes that script
# fail with `role "postgres" does not exist`.
jobs:
  pgstac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25", check-latest: true }
      - name: Run parity corpus (pgstac)
        run: go test -tags 'integration pgstac' -v -count=1 ./test/parity/...

  opensearch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25", check-latest: true }
      - name: Run parity corpus (opensearch)
        run: go test -tags 'integration opensearch' -v -count=1 ./test/parity/...
