name: docker

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

# Publishes container images to GHCR on push to main and on semver
# tags. The other workflows (ci.yml, integration.yml, conformance.yml)
# are the test gate; merges into main run them on the PR. Tag pushes
# rely on the same gate having passed at merge time.
permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            image: ghcr.io/${{ github.repository }}
            file: Dockerfile
            platforms: linux/amd64,linux/arm64
          - name: spatialite
            image: ghcr.io/${{ github.repository }}-spatialite
            file: Dockerfile.spatialite
            # CGO cross-compile needs the C toolchain for the target
            # arch — ship amd64 first, add arm64 if/when there's a
            # request.
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v4

      # Skip the matrix entry cleanly when the Dockerfile isn't on
      # this ref (e.g., Dockerfile.spatialite hasn't merged to main
      # yet). Avoids a red X for an entirely-expected absence.
      - id: dockerfile
        run: |
          if [ -f "${{ matrix.file }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.file }} not present on this ref; skipping ${{ matrix.name }} image"
          fi

      - uses: docker/login-action@v3
        if: steps.dockerfile.outputs.exists == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
        if: steps.dockerfile.outputs.exists == 'true' && matrix.platforms != 'linux/amd64'

      - uses: docker/setup-buildx-action@v3
        if: steps.dockerfile.outputs.exists == 'true'

      - id: meta
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        if: steps.dockerfile.outputs.exists == 'true'
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
